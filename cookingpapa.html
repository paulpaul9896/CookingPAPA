<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking PAPA</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #fafafa; } /* IG 淺色背景 */
        /* 視圖切換動畫 */
        .view-section { display: none; animation: fadeIn 0.2s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        /* IG 風格標題字體 */
        .ig-title { font-family: 'Brush Script MT', 'cursive', sans-serif; font-size: 1.5rem; }
        /* 隱藏原生滾動條 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-900 font-sans min-h-screen bg-gray-50 pb-16">

    <!-- 編輯視窗 (Modal) -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex-col items-center justify-end sm:justify-center">
        <div class="bg-white w-full max-w-lg sm:rounded-2xl rounded-t-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-gray-900 mb-4 text-center border-b pb-3">編輯貼文內容</h3>
            <div class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">款式 / 口味</label>
                    <input type="text" id="edit-flavor" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 mb-1">份量 (人)</label>
                        <input type="number" id="edit-serving" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 mb-1">評分</label>
                        <select id="edit-rating" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="5">⭐⭐⭐⭐⭐ 完美</option>
                            <option value="4">⭐⭐⭐⭐ 不錯</option>
                            <option value="3">⭐⭐⭐ 普通</option>
                            <option value="2">⭐⭐ 有待改善</option>
                            <option value="1">⭐ 中伏</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">標籤 (用逗號分隔)</label>
                    <input type="text" id="edit-tags" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 outline-none focus:ring-1 focus:ring-blue-500" placeholder="例如: 晚餐, 氣炸鍋">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">材料</label>
                    <textarea id="edit-ingredients" rows="3" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 outline-none focus:ring-1 focus:ring-blue-500"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">步驟</label>
                    <textarea id="edit-steps" rows="4" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 outline-none focus:ring-1 focus:ring-blue-500"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">參考連結 (選填)</label>
                    <input type="url" id="edit-reference" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 outline-none focus:ring-1 focus:ring-blue-500" placeholder="例如 YouTube 影片網址...">
                </div>
                <div class="flex gap-3 pt-4 border-t">
                    <button onclick="closeEditModal()" class="flex-1 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold transition">取消</button>
                    <button onclick="saveEdit()" class="flex-1 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-bold transition">儲存修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 載入中畫面 -->
    <div id="ai-loading" class="fixed inset-0 bg-black/60 z-50 hidden flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-10 h-10 text-white animate-spin mb-4"></i>
        <p class="text-white font-bold text-sm">AI 大廚構思緊食譜...</p>
    </div>

    <!-- 頂部導航欄 (IG 風格) -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-20 px-4 py-3 flex justify-between items-center max-w-3xl mx-auto w-full">
        <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')">
            <h1 class="ig-title font-bold text-gray-900">Cooking PAPA</h1>
            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-900"></i>
        </div>
        <div class="flex items-center gap-4 text-gray-900">
            <button onclick="navigate('add')" class="hover:text-gray-500 transition"><i data-lucide="plus-square" class="w-6 h-6"></i></button>
            <button onclick="navigate('profile')" class="hover:text-gray-500 transition"><i data-lucide="menu" class="w-6 h-6"></i></button>
        </div>
    </header>

    <div class="max-w-3xl mx-auto bg-white min-h-[80vh] border-x border-gray-100 shadow-sm">
        
        <!-- 視圖 1：首頁 / 個人檔案 (網格) -->
        <main id="view-home" class="view-section active">
            <!-- IG 個人檔案頭部 -->
            <div class="px-4 py-6 flex items-center gap-6">
                <!-- App Logo 頭像 -->
                <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full border border-gray-200 overflow-hidden flex-shrink-0 p-1 bg-gradient-to-tr from-yellow-400 via-orange-500 to-pink-500">
                    <div class="w-full h-full rounded-full bg-white p-0.5">
                        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23FFF3E0' width='100' height='100'/><text x='50' y='55' font-size='45' text-anchor='middle' dominant-baseline='middle'>👨🏻‍🍳</text></svg>" class="w-full h-full rounded-full object-cover bg-orange-50" alt="Cooking PAPA Logo">
                    </div>
                </div>
                <!-- 統計資料 -->
                <div class="flex-1 flex justify-around text-center">
                    <div class="flex flex-col"><span class="font-bold text-lg" id="stat-dishes">0</span><span class="text-xs text-gray-600">菜式</span></div>
                    <div class="flex flex-col"><span class="font-bold text-lg" id="stat-flavors">0</span><span class="text-xs text-gray-600">口味</span></div>
                    <div class="flex flex-col"><span class="font-bold text-lg" id="stat-records">0</span><span class="text-xs text-gray-600">記錄</span></div>
                </div>
            </div>
            <div class="px-4 pb-4">
                <h2 class="font-bold text-sm">爸爸大廚 cooking_papa</h2>
                <p class="text-sm text-gray-600 mt-1 whitespace-pre-line">紀錄為屋企人煮嘅每一餐😋🍽️
                ☁️ 雲端同步已開啟</p>
                <div class="mt-4 flex gap-2">
                    <button class="flex-1 bg-gray-100 hover:bg-gray-200 text-black font-bold text-sm py-1.5 rounded-lg transition" onclick="navigate('profile')">雲端備份設定</button>
                    <button class="flex-1 bg-gray-100 hover:bg-gray-200 text-black font-bold text-sm py-1.5 rounded-lg transition" onclick="navigate('add')">分享新食譜</button>
                </div>
            </div>

            <!-- 分頁 Tab -->
            <div class="flex border-t border-gray-200 mt-2">
                <div class="flex-1 text-center py-3 border-t-[1px] border-black -mt-[1px] cursor-pointer">
                    <i data-lucide="grid" class="mx-auto w-5 h-5 text-gray-900"></i>
                </div>
                <div class="flex-1 text-center py-3 cursor-pointer">
                    <i data-lucide="bookmark" class="mx-auto w-5 h-5 text-gray-400"></i>
                </div>
            </div>

            <!-- 網格 (IG Grid) -->
            <div id="dishes-grid" class="grid grid-cols-3 gap-0.5">
                <!-- 動態生成 -->
            </div>
        </main>

        <!-- 視圖 2：食譜詳情 (IG Post 風格) -->
        <main id="view-recipe" class="view-section">
            <div class="flex items-center gap-3 p-3 border-b border-gray-100 bg-white sticky top-0 z-10">
                <button onclick="navigate('home')" class="text-gray-900 hover:text-gray-500 transition"><i data-lucide="arrow-left"></i></button>
                <h2 class="font-bold text-gray-900 text-sm uppercase tracking-wide">食譜貼文</h2>
            </div>
            <div id="posts-container" class="pb-10">
                <!-- 動態生成 Post -->
            </div>
        </main>

        <!-- 視圖 3：新增食譜表單 -->
        <main id="view-add" class="view-section p-4 bg-white min-h-[70vh]">
            <div class="flex items-center justify-between mb-6 pb-2 border-b border-gray-100">
                <button onclick="navigate('home')" class="text-gray-900"><i data-lucide="x"></i></button>
                <h2 class="font-bold text-gray-900">新增食譜</h2>
                <button form="recipe-form" type="submit" class="text-blue-500 font-bold hover:text-blue-600 transition">分享</button>
            </div>
            
            <form id="recipe-form" onsubmit="saveNewRecipe(event)" class="space-y-4">
                <div class="flex gap-4 border-b border-gray-100 pb-4 items-start">
                    <div class="w-16 h-16 bg-gray-100 border border-gray-200 rounded-lg flex items-center justify-center flex-shrink-0 text-gray-400">
                        <i data-lucide="camera" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-1">
                        <input type="text" id="input-dish" required class="w-full text-sm py-1 border-none placeholder-gray-400 focus:ring-0 outline-none" placeholder="菜式名稱 (例如：巴斯克蛋糕)...">
                        <input type="text" id="input-flavor" required class="w-full text-sm py-1 border-none placeholder-gray-400 focus:ring-0 outline-none mt-1" placeholder="口味 (例如：原味)...">
                    </div>
                </div>
                <div class="pt-2">
                    <button type="button" onclick="generateAI()" class="w-full bg-blue-50 text-blue-600 text-sm font-bold py-2 rounded-lg flex items-center justify-center gap-1 hover:bg-blue-100 transition">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> AI 幫手寫食譜
                    </button>
                </div>
                <!-- 評分、份量、標籤 -->
                <div class="flex gap-3 mt-2">
                    <input type="number" id="input-serving" class="flex-1 text-sm py-2 border-b border-gray-100 placeholder-gray-400 outline-none" placeholder="👥 份量 (人)">
                    <select id="input-rating" class="flex-1 text-sm py-2 border-b border-gray-100 text-gray-600 outline-none bg-white">
                        <option value="5" selected>⭐⭐⭐⭐⭐ 完美</option>
                        <option value="4">⭐⭐⭐⭐ 不錯</option>
                        <option value="3">⭐⭐⭐ 普通</option>
                        <option value="2">⭐⭐ 有待改善</option>
                        <option value="1">⭐ 中伏</option>
                    </select>
                </div>
                <div>
                    <input type="text" id="input-tags" class="w-full text-sm py-3 border-b border-gray-100 placeholder-gray-400 outline-none" placeholder="🏷️ 標籤 (用逗號分隔，例如: 快手菜, 晚餐)">
                </div>
                <div>
                    <input type="url" id="input-reference" class="w-full text-sm py-3 border-b border-gray-100 placeholder-gray-400 outline-none" placeholder="🔗 原始食譜連結 (例如 YouTube, 網誌... 選填)">
                </div>
                <div>
                    <textarea id="input-ingredients" required rows="4" class="w-full text-sm py-2 border-b border-gray-100 placeholder-gray-400 outline-none resize-none" placeholder="輸入材料..."></textarea>
                </div>
                <div>
                    <textarea id="input-steps" required rows="6" class="w-full text-sm py-2 border-b border-gray-100 placeholder-gray-400 outline-none resize-none" placeholder="輸入烹飪步驟..."></textarea>
                </div>
            </form>
        </main>

        <!-- 視圖 4：雲端備份設定 (Profile) -->
        <main id="view-profile" class="view-section p-4 bg-white min-h-[70vh]">
            <div class="flex items-center gap-3 mb-6 pb-2 border-b border-gray-100">
                <button onclick="navigate('home')" class="text-gray-900"><i data-lucide="arrow-left"></i></button>
                <h2 class="font-bold text-gray-900">設定與備份</h2>
            </div>
            <div class="space-y-6">
                <!-- 雲端同步狀態 -->
                <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                    <h3 class="font-bold text-gray-900 flex items-center gap-2 mb-2"><i data-lucide="cloud-download" class="w-5 h-5 text-blue-500"></i> 雲端數據狀態</h3>
                    <p class="text-sm text-gray-600 mb-4 font-medium">目前使用無帳號自動同步模式。數據會自動備份到雲端，並與此瀏覽器綁定。</p>
                    <button onclick="forceSync()" class="w-full text-sm bg-blue-50 text-blue-600 font-bold py-2 rounded-lg hover:bg-blue-100 transition border border-blue-100 mb-2">從雲端重新載入數據</button>
                </div>

                <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                    <h3 class="font-bold text-gray-900 flex items-center gap-2 mb-2"><i data-lucide="key" class="w-5 h-5 text-yellow-500"></i> API 金鑰管理</h3>
                    <p class="text-xs text-gray-500 mb-3">設定你的 Gemini API Key 以使用 AI 食譜生成功能。</p>
                    <input type="password" id="setting-api-key" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg outline-none focus:border-blue-500 mb-2" placeholder="輸入 API 金鑰...">
                    <button onclick="saveApiKey()" class="w-full bg-gray-900 text-white text-sm font-bold py-2 rounded-lg hover:bg-gray-700 transition">儲存金鑰</button>
                </div>

                <!-- 載入示範數據 (開發用) -->
                <div class="bg-blue-50 rounded-xl p-4 border border-blue-100">
                    <h3 class="font-bold text-blue-900 flex items-center gap-2 mb-2"><i data-lucide="wand-2" class="w-5 h-5 text-blue-500"></i> 測試功能</h3>
                    <p class="text-xs text-blue-700 mb-3">一鍵載入幾個示範食譜，方便預覽排版。</p>
                    <button onclick="loadDemoData()" class="w-full bg-blue-500 text-white text-sm font-bold py-2 rounded-lg hover:bg-blue-600 transition shadow-sm">載入示範食譜</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 底部導航欄 (IG 風格) -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 z-20 pb-5 max-w-3xl left-1/2 -translate-x-1/2">
        <button onclick="navigate('home')" class="hover:scale-110 transition"><i data-lucide="home" class="w-6 h-6 text-gray-900"></i></button>
        <button class="hover:scale-110 transition"><i data-lucide="search" class="w-6 h-6 text-gray-900"></i></button>
        <button onclick="navigate('add')" class="hover:scale-110 transition"><i data-lucide="plus-square" class="w-6 h-6 text-gray-900"></i></button>
        <button class="hover:scale-110 transition"><i data-lucide="heart" class="w-6 h-6 text-gray-900"></i></button>
        <!-- 底部頭像縮圖 -->
        <button class="w-6 h-6 rounded-full border border-gray-300 overflow-hidden hover:scale-110 transition" onclick="navigate('profile')">
             <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23FFF3E0' width='100' height='100'/><text x='50' y='55' font-size='40' text-anchor='middle' dominant-baseline='middle'>👨🏻‍🍳</text></svg>" class="w-full h-full object-cover bg-orange-50">
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. Firebase 雲端初始化 ---
        const firebaseConfig = {
          apiKey: "REMOVED_FIREBASE_API_KEY",
          authDomain: "cooking-papa-51c66.firebaseapp.com",
          projectId: "cooking-papa-51c66",
          storageBucket: "cooking-papa-51c66.firebasestorage.app",
          messagingSenderId: "410761551111",
          appId: "1:410761551111:web:dc11932400d524615739a2",
          measurementId: "G-3B1ZTPXBZE"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const dbFirestore = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cooking-papa-app';
        
        let currentUser = null;
        let db = []; 
        let currentDishId = null;
        let currentFlavorId = null;
        let isFirstLoad = true; 

        // 綁定到 window (防止按鈕失效)
        window.navigate = navigate;
        window.saveNewRecipe = saveNewRecipe;
        window.saveRecord = saveRecord;
        window.deleteRecord = deleteRecord;
        window.deleteCurrentRecipe = deleteCurrentRecipe;
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.saveEdit = saveEdit;
        window.toggleFavorite = toggleFavorite;
        window.forceSync = () => { 
            refreshCurrentView();
            alert("已成功從雲端重新載入數據！✅"); 
        };
        window.saveApiKey = () => {
            const key = document.getElementById('setting-api-key').value;
            localStorage.setItem('geminiApiKey', key);
            alert("API 金鑰已儲存！");
        };
        window.loadDemoData = loadDemoData;

        // --- 2. 自動登入邏輯 ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenError) {
                        console.warn("自訂 Firebase Config 導致 Token 不匹配，切換至匿名登入...");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch(e) { 
                console.error("自動登入發生錯誤：", e); 
            }
        };

        let unsubscribeSnapshot = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                const recipesRef = collection(dbFirestore, 'artifacts', appId, 'users', user.uid, 'recipes');
                unsubscribeSnapshot = onSnapshot(recipesRef, (snapshot) => {
                    db = [];
                    snapshot.forEach(docSnap => { db.push({ id: docSnap.id, ...docSnap.data() }); });
                    
                    if (isFirstLoad && db.length === 0) {
                        isFirstLoad = false;
                        loadDemoData(false); 
                    } else {
                        isFirstLoad = false;
                        refreshCurrentView();
                    }
                }, (error) => { 
                    console.error("雲端讀取失敗", error); 
                });
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initAuth();
            document.getElementById('setting-api-key').value = localStorage.getItem('geminiApiKey') || "AIzaSyDfQ-dzmJVvNFdPlWvhQnbkh-DjJ1Qg5mo";
            navigate('home');
        });

        async function syncToCloud(dishData) {
            if (!currentUser) return;
            const docRef = doc(dbFirestore, 'artifacts', appId, 'users', currentUser.uid, 'recipes', dishData.id);
            await setDoc(docRef, dishData);
        }

        async function deleteFromCloud(dishId) {
            if (!currentUser) return;
            const docRef = doc(dbFirestore, 'artifacts', appId, 'users', currentUser.uid, 'recipes', dishId);
            await deleteDoc(docRef);
        }

        function refreshCurrentView() {
            const activeView = document.querySelector('.view-section.active').id;
            if (activeView === 'view-home') renderHome();
            else if (activeView === 'view-recipe' && currentDishId && currentFlavorId) renderPost(currentDishId, currentFlavorId);
            lucide.createIcons();
        }

        function navigate(viewId, dishId = null, flavorId = null) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            if (viewId === 'home') { currentDishId = null; currentFlavorId = null; renderHome(); }
            else if (viewId === 'recipe' && dishId && flavorId) { currentDishId = dishId; currentFlavorId = flavorId; renderPost(dishId, flavorId); }
            else if (viewId === 'add') { document.getElementById('recipe-form').reset(); }
            lucide.createIcons();
            window.scrollTo(0,0);
        }

        // 渲染 IG Grid
        function renderHome() {
            const grid = document.getElementById('dishes-grid');
            grid.innerHTML = '';
            
            let totalDishes = db.length;
            let totalFlavors = 0;
            let totalRecords = 0;
            let allPosts = [];

            db.forEach(dish => {
                totalFlavors += (dish.flavors || []).length;
                (dish.flavors || []).forEach(flavor => {
                    totalRecords += (flavor.records || []).length;
                    let coverImg = 'https://images.unsplash.com/photo-1495195134817-aeb325a55b65?auto=format&fit=crop&w=800&q=80';
                    if (flavor.records && flavor.records.length > 0 && flavor.records[0].image) coverImg = flavor.records[0].image;
                    allPosts.push({ dishId: dish.id, flavorId: flavor.id, imgSrc: coverImg });
                });
            });

            document.getElementById('stat-dishes').innerText = totalDishes;
            document.getElementById('stat-flavors').innerText = totalFlavors;
            document.getElementById('stat-records').innerText = totalRecords;

            if (allPosts.length === 0) {
                grid.innerHTML = '<div class="col-span-3 py-10 text-center text-gray-400 text-sm">尚未發佈任何食譜貼文<br>撳下面 + 號開始分享啦！</div>';
                return;
            }

            allPosts.reverse().forEach(post => {
                grid.innerHTML += `

        // --- 功能操作 ---

        // 愛心收藏功能
        async function toggleFavorite() {
            const dish = db.find(d => d.id === currentDishId);
            const flavor = dish.flavors.find(f => f.id === currentFlavorId);
            flavor.isFavorite = !flavor.isFavorite; // 反轉狀態
            await syncToCloud(dish);
            renderPost(currentDishId, currentFlavorId); // 重新渲染更新圖示
            lucide.createIcons();
        }

        // 編輯邏輯
        function openEditModal() {
            const dish = db.find(d => d.id === currentDishId);
            const flavor = dish.flavors.find(f => f.id === currentFlavorId);
            document.getElementById('edit-flavor').value = flavor.name;
            document.getElementById('edit-ingredients').value = flavor.ingredients;
            document.getElementById('edit-steps').value = flavor.steps;
            document.getElementById('edit-reference').value = flavor.reference || '';
            document.getElementById('edit-serving').value = flavor.serving || '';
            document.getElementById('edit-rating').value = flavor.rating || '5';
            document.getElementById('edit-tags').value = (flavor.tags || []).join(', ');
            
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-modal').classList.add('flex');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            document.getElementById('edit-modal').classList.remove('flex');
        }

        async function saveEdit() {
            const dish = db.find(d => d.id === currentDishId);
            const flavor = dish.flavors.find(f => f.id === currentFlavorId);
            
            flavor.name = document.getElementById('edit-flavor').value.trim();
            flavor.ingredients = document.getElementById('edit-ingredients').value;
            flavor.steps = document.getElementById('edit-steps').value;
            flavor.reference = document.getElementById('edit-reference').value.trim();
            flavor.serving = document.getElementById('edit-serving').value.trim();
            flavor.rating = parseInt(document.getElementById('edit-rating').value);
            
            const tagsRaw = document.getElementById('edit-tags').value;
            flavor.tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0);

            await syncToCloud(dish);
            closeEditModal();
        }

        // AI 生成
        window.generateAI = async function() {
            const dishName = document.getElementById('input-dish').value.trim();
            if(!dishName) return alert("請先輸入菜式名稱！");
            
            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-loading').classList.add('flex');

            const apiKey = localStorage.getItem('geminiApiKey') || "AIzaSyDfQ-dzmJVvNFdPlWvhQnbkh-DjJ1Qg5mo";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: `請提供「${dishName}」的食譜。要求：一個特色口味名稱、材料清單、烹飪步驟。` }] }],
                systemInstruction: { parts: [{ text: "You are a chef. Always output raw valid JSON ONLY. Schema: {\"flavor\":\"string\", \"ingredients\":\"string (use newlines)\", \"steps\":\"string (use newlines numbered)\"}" }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const result = await response.json();
                const recipeData = JSON.parse(result.candidates[0].content.parts[0].text);
                
                document.getElementById('input-flavor').value = recipeData.flavor || "原味";
                document.getElementById('input-ingredients').value = recipeData.ingredients || "";
                document.getElementById('input-steps').value = recipeData.steps || "";
            } catch (error) {
                alert("未能連接 AI 大廚！建議將程式碼部署至 GitHub 後再試。");
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-loading').classList.remove('flex');
            }
        }

        // 圖片處理
        function resizeImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > 800) { height *= 800 / width; width = 800; } } 
                    else { if (height > 800) { width *= 800 / height; height = 800; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        async function saveRecord() {
            const fileInput = document.getElementById('record-image');
            const note = document.getElementById('record-note').value;
            const file = fileInput.files[0];

            const addObj = async (imgData) => {
                const dish = db.find(d => d.id === currentDishId);
                const flavor = dish.flavors.find(f => f.id === currentFlavorId);
                flavor.records = flavor.records || [];
                flavor.records.push({ id: 'r' + Date.now(), date: new Date().toLocaleDateString(), image: imgData, note: note });
                await syncToCloud(dish);
                fileInput.value = ''; document.getElementById('record-note').value = '';
            };

            if (file) resizeImage(file, addObj); else addObj(null);
        }

        async function deleteRecord(recordId) {
            if(!confirm('確定要刪除這筆相片記錄嗎？')) return;
            const dish = db.find(d => d.id === currentDishId);
            const flavor = dish.flavors.find(f => f.id === currentFlavorId);
            flavor.records = flavor.records.filter(r => r.id !== recordId);
            await syncToCloud(dish);
        }

        async function deleteCurrentRecipe() {
            if(!confirm('警告：確定要刪除整篇食譜嗎？此操作無法還原。')) return;
            const dish = db.find(d => d.id === currentDishId);
            dish.flavors = dish.flavors.filter(f => f.id !== currentFlavorId);
            if(dish.flavors.length === 0) {
                await deleteFromCloud(currentDishId);
            } else {
                await syncToCloud(dish);
            }
            navigate('home');
        }

        async function saveNewRecipe(event) {
            event.preventDefault();
            const dishName = document.getElementById('input-dish').value.trim();
            const flavorName = document.getElementById('input-flavor').value.trim();
            const reference = document.getElementById('input-reference').value.trim();
            const ingredients = document.getElementById('input-ingredients').value;
            const steps = document.getElementById('input-steps').value;
            const serving = document.getElementById('input-serving').value.trim();
            const rating = parseInt(document.getElementById('input-rating').value);
            
            const tagsRaw = document.getElementById('input-tags').value;
            const tagsArr = tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0);

            let dish = db.find(d => d.name.toLowerCase() === dishName.toLowerCase());
            const newFlavor = { 
                id: 'f' + Date.now(), 
                name: flavorName, 
                ingredients: ingredients, 
                steps: steps, 
                reference: reference,
                serving: serving,
                rating: rating,
                tags: tagsArr,
                isFavorite: false,
                records: [] 
            };

            if (dish) {
                dish.flavors.push(newFlavor);
                await syncToCloud(dish);
                navigate('recipe', dish.id, newFlavor.id);
            } else {
                const newDishId = 'd' + Date.now();
                const newDish = { id: newDishId, name: dishName, cover: null, flavors: [newFlavor] };
                await syncToCloud(newDish);
                setTimeout(() => navigate('recipe', newDishId, newFlavor.id), 500);
            }
        }
